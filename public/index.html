<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/cybex.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5"
    />
    <meta name="theme-color" content="#06b6d4" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Cybex Tech - Professional website design, development, management, and security services for businesses in Kenya. Build a strong online presence with our reliable digital solutions."
    />
    <meta
      name="keywords"
      content="web design Kenya, website development, website management, website security, domain hosting, web development Nairobi, digital solutions, website optimization"
    />
    <meta name="author" content="Cybex Tech" />
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />
    <meta name="googlebot" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cybextech.co.ke/" />
    <meta
      property="og:title"
      content="Cybex Tech - Website Design & Development Services"
    />
    <meta
      property="og:description"
      content="Professional web design, development, and management services for businesses. Build your strong online presence with Cybex Tech."
    />
    <meta property="og:image" content="%PUBLIC_URL%/cybex.png" />
    <meta property="og:site_name" content="Cybex Tech" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://cybextech.co.ke/" />
    <meta
      property="twitter:title"
      content="Cybex Tech - Website Design & Development Services"
    />
    <meta
      property="twitter:description"
      content="Professional web design, development, and management services for businesses. Build your strong online presence with Cybex Tech."
    />
    <meta property="twitter:image" content="%PUBLIC_URL%/cybex.png" />

    <!-- LinkedIn -->
    <meta
      property="article:publisher"
      content="https://linkedin.com/company/cybex"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://cybextech.co.ke/" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/cybex.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Structured Data (Schema.org) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Cybex Tech",
        "url": "https://cybextech.co.ke/",
        "logo": "https://cybextech.co.ke/cybex.png",
        "description": "Professional website design, development, management, and security services",
        "sameAs": [
          "https://twitter.com/cybex",
          "https://linkedin.com/company/cybex",
          "https://facebook.com/cybex",
          "https://instagram.com/cybex"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Service",
          "availableLanguageId": "en-KE"
        },
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "KE"
        }
      }
    </script>

    <title>
      Cybex Tech - Professional Website Design & Development Services
    </title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
